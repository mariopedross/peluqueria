  <text x="110" y="142" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="26" font-style="italic" fill="#9b3357" font-weight="500">Esther Pedrós</text>
  <text x="110" y="162" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#d96e94" letter-spacing="5">SALÓN DE BELLEZA</text>
